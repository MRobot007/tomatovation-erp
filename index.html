<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />

    <title>Tomatovation ERP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Space Grotesk for display, Inter for UI, JetBrains Mono for figures.

      The serif that was here (Fraunces) is an editorial face — it belongs on a
      magazine, and on a screen full of attendance data it read as costume
      rather than as authority. Space Grotesk is a grotesque with drawn-in,
      machined terminals: precise, a little technical, and it shares its
      character with the metal rail and the glass rather than arguing with it.

      Two families doing different jobs, not two that look alike: a geometric
      display against a neutral UI sans is a real pairing. Inter stays because
      nothing beats it for dense interface text at 13-15px.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
  </head>
  <body class="h-full">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
